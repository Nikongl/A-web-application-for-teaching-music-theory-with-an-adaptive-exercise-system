name: CI

on:
  push:
    branches: [ labwork5, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Compose
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose

      - name: Build Backend image
        run: docker build -t music-backend ./backend

      - name: Build Frontend image
        run: docker build -t music-frontend ./frontend

      - name: Start containers
        run: docker-compose up -d

      - name: Wait for backend
        run: |
          echo "Waiting for backend to become healthy..."
          for i in {1..30}; do
            if curl -s -f http://localhost:8000/api/exercise-types/; then
              echo "Backend is ready!"
              break
            fi
            echo "Attempt $i: backend not ready yet..."
            sleep 3
            if [ $i -eq 30 ]; then
              echo "Backend failed to start after 30 attempts."
              docker-compose logs backend
              exit 1
            fi
          done

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Newman
        run: npm install -g newman

      - name: Run Postman tests
        run: newman run postman/collection.json

      - name: Show logs on failure
        if: failure()
        run: docker-compose logs

      - name: Stop containers
        if: always()
        run: docker-compose down