name: CI/CD Pipeline

on:
  push:
    branches: [ labwork5, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Compose
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose

      - name: Build Backend image
        run: docker build -t music-backend ./backend

      - name: Build Frontend image
        run: docker build -t music-frontend ./frontend

      - name: Start containers
        run: docker-compose up -d

      - name: Wait for backend
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:8000/api/exercise-types/ > /dev/null; then
              echo "Backend is ready"
              break
            fi
            echo "Waiting for backend... $i"
            sleep 3
          done

      - name: Create test data
        run: |
          curl -X POST http://localhost:8000/api/exercise-types/ \
            -H "Content-Type: application/json" \
            -d '{"name": "Тестовый тип", "code": "test_type", "icon": "🎵", "order": 1}'

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Newman
        run: npm install -g newman

      - name: Run Postman tests
        run: newman run postman/collection.json

      - name: Show logs on failure
        if: failure()
        run: docker-compose logs

      - name: Stop containers
        run: docker-compose down

  publish:
    needs: test
    if: github.ref == 'refs/heads/labwork5' && success()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/music-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/music-backend:${{ github.sha }}

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/music-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/music-frontend:${{ github.sha }}