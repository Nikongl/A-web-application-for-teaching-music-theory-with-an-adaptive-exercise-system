services:
  backend:
    build: ./backend
    container_name: music_backend
    restart: always
    command: >
      sh -c "
             python wait-for-db.py &&
             python manage.py migrate &&
             gunicorn backend_project.wsgi:application --bind 0.0.0.0:8000 --workers 3
           "
    ports:
      - "8000:8000"
    environment:
      DB_HOST: ${DB_HOST}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_PORT: 5432
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: "False"
      ALLOWED_HOSTS: "*"
  frontend:
    build: ./frontend
    container_name: music_frontend
    restart: always
    ports:
      - "3000:80"